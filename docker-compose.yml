services:
  api:
    build:
      context: .
      dockerfile: SmartInventory.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SmartInventoryDb: Server=Your-ServerName;Database=Your-database;User Id=Your-UserId;Password=Your_Password;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True
      Redis__ConnectionString: redis:6379
      Jwt__Key: super_secret_jwt_key_123456789_super_secret_key
      Jwt__Issuer: SmartInventory
      Jwt__Audience: SmartInventoryUsers
      Jwt__ExpiresInMinutes: 60
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: Your-SA_PASSWORD
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your-SA_PASSWORD" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"